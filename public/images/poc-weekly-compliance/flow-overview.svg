    <text x="536" y="320" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Threshold Rules</text>
    <text x="536" y="354" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="17">Highlights sites under goal</text>
  </g>
