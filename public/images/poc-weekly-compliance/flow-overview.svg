    <text x="236" y="508" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">State Email</text>
    <text x="236" y="542" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="17">Tennessee group</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="493" y="470" width="214" height="112" rx="18" fill="#0f172a" stroke="#34d399" stroke-opacity="0.45"/>
    <text x="523" y="508" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">State Email</text>
    <text x="523" y="542" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="17">Indiana group</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="780" y="470" width="214" height="112" rx="18" fill="#0f172a" stroke="#34d399" stroke-opacity="0.45"/>
    <text x="810" y="508" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">State Email</text>
    <text x="810" y="542" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="17">Illinois group</text>
  </g>
  <path d="M300 150h72" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M612 150h88" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M824 206v76" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M420 338h86" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M639 394v76" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M639 394c0 44-326 44-326 76" stroke="#22d3ee" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.78"/>
  <path d="M639 394c0 44 248 44 248 76" stroke="#22d3ee" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.78"/>
  <circle cx="300" cy="150" r="7" fill="#22d3ee"/>
  <circle cx="612" cy="150" r="7" fill="#38bdf8"/>
  <circle cx="824" cy="206" r="7" fill="#34d399"/>
  <circle cx="639" cy="394" r="7" fill="#f59e0b"/>
  <text x="86" y="632" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="16">Sensitive identifiers, recipients, hosts, and credential details intentionally omitted.</text>
