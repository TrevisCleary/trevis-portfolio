    <text x="888" y="320" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Failure Path</text>
    <text x="888" y="354" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="17">High-priority alerting</text>
  </g>
  <g filter="url(#shadow)">
