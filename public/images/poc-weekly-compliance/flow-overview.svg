<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">POC weekly compliance automation overview</title>
  <desc id="desc">A scrubbed workflow diagram showing a scheduled Power Automate flow, a desktop reporting bot, generated compliance data, and state-specific email distribution.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06111f"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="52" y="48" width="1096" height="579" rx="34" fill="#020617" opacity="0.42"/>
  <path d="M130 150h940" stroke="#334155" stroke-width="2" stroke-dasharray="8 12"/>
  <path d="M130 338h940" stroke="#334155" stroke-width="2" stroke-dasharray="8 12"/>
  <path d="M130 526h940" stroke="#334155" stroke-width="2" stroke-dasharray="8 12"/>
  <g filter="url(#shadow)">
    <rect x="86" y="94" width="214" height="112" rx="18" fill="#0f172a" stroke="#22d3ee" stroke-opacity="0.55"/>
    <text x="116" y="132" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Weekly Trigger</text>
    <text x="116" y="166" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="17">Scheduled cloud flow</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="372" y="94" width="240" height="112" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.45"/>
    <text x="402" y="132" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Desktop Runner</text>
    <text x="402" y="166" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="17">Attended browser workflow</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="700" y="94" width="248" height="112" rx="18" fill="#0f172a" stroke="#34d399" stroke-opacity="0.45"/>
    <text x="730" y="132" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Report Extracts</text>
    <text x="730" y="166" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="17">Seven-day compliance data</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="170" y="282" width="250" height="112" rx="18" fill="#0f172a" stroke="#818cf8" stroke-opacity="0.45"/>
    <text x="200" y="320" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Data Shaping</text>
    <text x="200" y="354" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="17">Excel rows to HTML tables</text>
  </g>
  <g filter="url(#shadow)">
